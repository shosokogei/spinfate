name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy to Firebase (Hosting + Functions)
        run: npx firebase-tools@latest deploy --only hosting,functions --project spinfate1 --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
